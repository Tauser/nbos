; NC-OS baseline
; Reproducible build and minimal validation track

[platformio]
default_envs = esp32s3_dev

[env]
monitor_speed = 115200

[env:esp32s3_dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
build_type = debug
lib_deps =
  lovyan03/LovyanGFX @ ^1.2.7
build_flags =
  -D NCOS_PROFILE_DEV=1

[env:esp32s3_prod]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
build_type = release
lib_deps =
  lovyan03/LovyanGFX @ ^1.2.7
build_flags =
  -D NCOS_PROFILE_PROD=1

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_type = debug
build_flags =
  -I src
  -D NCOS_PROFILE_DEV=1
  -D NCOS_NATIVE_TESTS=1
