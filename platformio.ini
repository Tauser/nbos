; NC-OS baseline
; Reproducible build and minimal validation track

[platformio]
default_envs = esp32s3_dev

[env]
monitor_speed = 115200
monitor_filters = colorize, esp32_exception_decoder
#monitor_rts = 0

[env:esp32s3_dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
build_type = debug
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
lib_deps =
  lovyan03/LovyanGFX @ ^1.2.7
build_flags =
  -D NCOS_PROFILE_DEV=1

[env:esp32s3_prod]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
build_type = release
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
lib_deps =
  lovyan03/LovyanGFX @ ^1.2.7
build_flags =
  -D NCOS_PROFILE_PROD=1

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_type = debug
build_flags =
  -I src
  -D NCOS_PROFILE_DEV=1
  -D NCOS_NATIVE_TESTS=1
